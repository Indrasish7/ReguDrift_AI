steps:
  # ==========================================================
  # 1. Build and push FastAPI Backend container image
  # ==========================================================
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/regudrift-repo/web:latest'
      - '.'
      - '-f'
      - 'Dockerfile'
    id: 'build-web'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/regudrift-repo/web:latest'
    id: 'push-web'
    depends_on: ['build-web']

  # ==========================================================
  # 2. Build and push Streamlit UI container image
  # ==========================================================
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/regudrift-repo/ui:latest'
      - './ui'
      - '-f'
      - './ui/Dockerfile'
    id: 'build-ui'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/regudrift-repo/ui:latest'
    id: 'push-ui'
    depends_on: ['build-ui']

  # ==========================================================
  # 3. Build and push Next.js Frontend container image
  # ==========================================================
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/regudrift-repo/frontend:latest'
      - './frontend'
      - '-f'
      - './frontend/Dockerfile'
    id: 'build-frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/regudrift-repo/frontend:latest'
    id: 'push-frontend'
    depends_on: ['build-frontend']

  # ==========================================================
  # 4. Deploy all services concurrently to Cloud Run
  # ==========================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'regudrift-web'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/regudrift-repo/web:latest'
      - '--region=${_REGION}'
    id: 'deploy-web'
    depends_on: ['push-web']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'regudrift-ui'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/regudrift-repo/ui:latest'
      - '--region=${_REGION}'
    id: 'deploy-ui'
    depends_on: ['push-ui', 'deploy-web']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'regudrift-frontend'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/regudrift-repo/frontend:latest'
      - '--region=${_REGION}'
    id: 'deploy-frontend'
    depends_on: ['push-frontend', 'deploy-web']

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/regudrift-repo/web:latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/regudrift-repo/ui:latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/regudrift-repo/frontend:latest'

substitutions:
  _REGION: 'asia-south1'

options:
  logging: 'CLOUD_LOGGING_ONLY'
